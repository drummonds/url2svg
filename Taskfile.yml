version: "3"

tasks:
  build:
    desc: Build the binary
    cmds:
      - go build -o url2svg ./cmd/url2svg

  check:
    desc: Run fmt, vet, lint, and tests
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  demo:serve:
    desc: Run the demo showcase server
    cmds:
      - go run ./cmd/demo

  demo:capture:
    desc: Capture the demo page as SVG
    cmds:
      - go build -o url2svg ./cmd/url2svg
      - go run ./cmd/demo &
      - sleep 2
      - ./url2svg -url http://localhost:8082 -o docs/demo.svg
      - kill %1 || true

  docs:build:
    desc: Build documentation
    cmds:
      - task: demo:capture
      - task-plus md2html --file index.md --dst docs

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f url2svg
