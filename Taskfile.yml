version: "3"

tasks:
  release:*:*:
    desc: Final release process eg task release:v0.1.0:"initial release"
    vars:
      TAG: "{{index .MATCH 0}}"
      BUILD: "{{index .MATCH 1}}"
    cmds:
      - task: clean
      - task: build
      - task: check
      - git add .
      - git commit -am "{{.BUILD}}"
      - git tag "{{.TAG}}"
      - git push origin "{{.TAG}}"
      - git push

  build:
    desc: Build the binary
    cmds:
      - go build -o url2svg .

  check:
    desc: Run fmt, vet, and tests
    cmds:
      - task: fmt
      - task: vet
      - task: test

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f url2svg
