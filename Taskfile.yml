version: "3"

tasks:
  release:
    desc: 'Release process eg task release VERSION=v0.1.0 COMMENT="initial release"'
    requires:
      vars: [VERSION, COMMENT]
    cmds:
      - task: clean
      - task: build
      - task: check
      - git add .
      - git commit -am "{{.COMMENT}}"
      - git tag "{{.VERSION}}"
      - git push origin "{{.VERSION}}"
      - git push

  build:
    desc: Build the binary
    cmds:
      - go build -o url2svg .

  check:
    desc: Run fmt, vet, and tests
    cmds:
      - task: fmt
      - task: vet
      - task: test

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f url2svg
